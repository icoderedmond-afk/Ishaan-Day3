<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Animal Trivia Quiz</title>
    <style>
        :root {

            --card-bg: rgba(15, 23, 42, 0.88);
            --accent-easy: #10b981;
            --accent-medium: #38bdf8;
            --accent-hard: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.15);
            --hover-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-image 0.6s ease-in-out;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 680px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38bdf8, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .mode-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn.active.easy {
            background-color: #10b981;
            color: #000;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        .mode-btn.active.medium {
            background-color: #0284c7;
            color: #fff;
            box-shadow: 0 0 15px rgba(2, 132, 199, 0.5);
        }

        .mode-btn.active.hard {
            background-color: #d97706;
            color: #fff;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.5);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.easy { background: rgba(16, 185, 129, 0.25); color: #34d399; border: 1px solid #10b981; }
        .badge.medium { background: rgba(56, 189, 248, 0.25); color: #38bdf8; border: 1px solid #0284c7; }
        .badge.hard { background: rgba(245, 158, 11, 0.25); color: #fbbf24; border: 1px solid #d97706; }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 24px;
            min-height: 60px;
            color: #ffffff;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-btn {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--text-primary);
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: rgba(16, 185, 129, 0.3) !important;
            border-color: #10b981 !important;
            color: #6ee7b7 !important;
            font-weight: 700;
        }

        .option-btn.incorrect {
            background-color: rgba(239, 68, 68, 0.3) !important;
            border-color: #ef4444 !important;
            color: #fca5a5 !important;
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.9;
        }

            background-color: rgba(0, 0, 0, 0.5);
            border-left: 4px solid #38bdf8;
            padding: 16px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 24px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e2e8f0;
            display: none;
        }

            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #38bdf8, #6366f1);
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s ease;
            display: none;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .next-btn:hover {
            opacity: 0.9;
        }

        .results-card {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 4px solid #38bdf8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .score-num {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .score-total {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

            background: linear-gradient(to right, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .restart-btn:hover {
            opacity: 0.9;
        }

</head>

<div class="container">
    <header>
        <h1>Fauna Discovery</h1>
        <p class="subtitle">Procedural Animal Kingdom Quiz Engine</p>
    </header>

    <!-- Difficulty Toggle -->
    <div class="mode-selector" id="modeSelector">
        <button class="mode-btn active easy" onclick="setDifficulty('easy')">Easy (Rainforest)</button>
        <button class="mode-btn medium" onclick="setDifficulty('medium')">Medium (Barrier Reef)</button>
        <button class="mode-btn hard" onclick="setDifficulty('hard')">Hard (Savannah)</button>
    </div>

    <!-- Quiz Area -->
    <div id="quizArea">
        <div class="stats-bar">
            <span>Question <strong id="qCurrent">1</strong> of 10</span>
            <span class="badge easy" id="diffBadge">Easy</span>
            <span>Score: <strong id="scoreDisplay">0</strong></span>
        </div>

        <div class="question-text" id="questionText">Generating question...</div>

        <div class="options-grid" id="optionsGrid"></div>

        <div class="explanation" id="explanationText"></div>

        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
    </div>

    <!-- Results Screen -->
    <div class="results-card" id="resultsCard">
        <h2>Quiz Completed!</h2>
        <p class="subtitle" id="resultSubtitle">Here is how you performed:</p>

        <div class="score-circle">
            <span class="score-num" id="finalScore">0</span>
            <span class="score-total">out of 10</span>
        </div>

        <p id="feedbackText" style="margin-bottom: 12px; color: #e2e8f0; font-size: 1.1rem;"></p>

        <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
    </div>
</div>

    ];

    // --- QUESTION POOL BUILDERS ---

    function buildEasyQuestionPoolForAnimal(a) {
        return [
            { animalId: a.id, q: `In which natural environment do wild ${a.name}s primarily live?`, options: [a.habitat, ...a.badHabitats], correct: 0, exp: `${a.name}s are natively adapted to live in ${a.habitat}.` },
            { animalId: a.id, q: `What constitutes the main primary diet for a wild ${a.name}?`, options: [a.food, ...a.badFoods], correct: 0, exp: `The primary food source for a ${a.name} consists of ${a.food}.` },
            { animalId: a.id, q: `Which notable behavioral trait or physical fact is famous regarding the ${a.name}?`, options: [a.fact.charAt(0).toUpperCase() + a.fact.slice(1), ...a.badFacts], correct: 0, exp: `A famous fact about the ${a.name} is that ${a.fact}.` },
            { animalId: a.id, q: `What is a young or offspring of a ${a.name} called?`, options: [a.baby.charAt(0).toUpperCase() + a.baby.slice(1), ...a.badBabies.map(b => b.charAt(0).toUpperCase() + b.slice(1))], correct: 0, exp: `A baby or young offspring of a ${a.name} is officially referred to as a ${a.baby}.` },
            { animalId: a.id, q: `What is the collective noun used for a group of ${a.name}s?`, options: [a.group.charAt(0).toUpperCase() + a.group.slice(1), ...a.badGroups.map(g => g.charAt(0).toUpperCase() + g.slice(1))], correct: 0, exp: `A gathering or group of ${a.name}s is officially called a ${a.group}.` }
        ];
    }

    function buildMediumQuestionPoolForAnimal(a) {
        return [
            { animalId: a.id, q: `The ${a.name}, known for featuring ${a.trait}, belongs to which specific taxonomic group?`, options: [a.relation, ...a.badRelations], correct: 0, exp: `The ${a.name} is classified under ${a.relation}.` },
            { animalId: a.id, q: `In which specific geographical location is the ${a.name} natively found?`, options: [a.location, ...a.badLocations], correct: 0, exp: `The native distribution of the ${a.name} is in the ${a.location}.` },
            { animalId: a.id, q: `Which physiological or behavioral adaptation is specialized in the ${a.name}?`, options: [a.adapt.charAt(0).toUpperCase() + a.adapt.slice(1), ...a.badAdapts.map(ad => ad.charAt(0).toUpperCase() + ad.slice(1))], correct: 0, exp: `The ${a.name} is famous for its ${a.adapt}.` }
        ];
    }

    function buildHardQuestionPoolForAnimal(a) {
        return [
            { animalId: a.id, q: `What is the precise IUCN Red List conservation status assigned to the ${a.name}?`, options: [a.status, ...a.badStatuses], correct: 0, exp: `The ${a.name} is currently designated as ${a.status}.` },
            { animalId: a.id, q: `The ${a.name} is natively restricted or endemic to which specific geographic locality?`, options: [a.region, ...a.badRegions], correct: 0, exp: `The native geographical range of the ${a.name} is the ${a.region}.` },
            { animalId: a.id, q: `Which specific ecological threat is documented as the primary driver of decline for the ${a.name}?`, options: [a.threat, ...a.badThreats], correct: 0, exp: `The primary threat facing ${a.name} populations is ${a.threat}.` },
            { animalId: a.id, q: `Taxonomically, how is the obscure ${a.name} categorized?`, options: [a.sub, ...a.badSubs], correct: 0, exp: `Taxonomically, ${a.name} is categorized under ${a.sub}.` }
        ];
    }

    // --- GAME ENGINE STATE ---
    let currentDifficulty = 'easy';
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(arr) {
        let copy = [...arr];
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    function loadQuestions() {
        let animalList, builderFunc;

        if (currentDifficulty === 'easy') {
            animalList = easyAnimals;
            builderFunc = buildEasyQuestionPoolForAnimal;
        } else if (currentDifficulty === 'medium') {
            animalList = mediumAnimals;
            builderFunc = buildMediumQuestionPoolForAnimal;
        } else {
            animalList = hardAnimals;
            builderFunc = buildHardQuestionPoolForAnimal;
        }

        // Pick 10 DISTINCT animals randomly
        let shuffledAnimals = shuffleArray(animalList);
        let selected10Animals = shuffledAnimals.slice(0, 10);

        let quiz10Questions = [];
        selected10Animals.forEach(animal => {
            let animalQuestions = builderFunc(animal);
            let chosenQ = animalQuestions[Math.floor(Math.random() * animalQuestions.length)];
            
            let shuffledOpts = [...chosenQ.options];
            let correctText = chosenQ.options[chosenQ.correct];
            for (let i = shuffledOpts.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [shuffledOpts[i], shuffledOpts[j]] = [shuffledOpts[j], shuffledOpts[i]];
            }

            quiz10Questions.push({
                q: chosenQ.q,
                options: shuffledOpts,
                correct: shuffledOpts.indexOf(correctText),
                exp: chosenQ.exp,
                animalId: chosenQ.animalId
            });
        });

        currentQuestions = shuffleArray(quiz10Questions);
    }

    function setDifficulty(diff) {
        currentDifficulty = diff;
        document.body.style.backgroundImage = `url('${BACKGROUNDS[diff]}')`;

        const buttons = document.querySelectorAll('.mode-btn');
        buttons.forEach(btn => {
            btn.classList.remove('active', 'easy', 'medium', 'hard');
            if (btn.textContent.toLowerCase().includes(diff)) {
                btn.classList.add('active', diff);
            }
        });

        const badge = document.getElementById('diffBadge');
        badge.className = `badge ${diff}`;
        badge.textContent = diff.toUpperCase();

        restartQuiz();
    }

    function displayQuestion() {
        answered = false;
        const qData = currentQuestions[currentIndex];

        document.getElementById('qCurrent').textContent = currentIndex + 1;
        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('questionText').textContent = qData.q;
        
        const optionsGrid = document.getElementById('optionsGrid');
        optionsGrid.innerHTML = '';

        const expBox = document.getElementById('explanationText');
        expBox.style.display = 'none';
        expBox.textContent = '';

        document.getElementById('nextBtn').style.display = 'none';

        qData.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${opt}</span>`;
            btn.onclick = () => selectOption(idx);
            optionsGrid.appendChild(btn);
        });
    }

    function selectOption(selectedIndex) {
        if (answered) return;
        answered = true;

        const qData = currentQuestions[currentIndex];
        const buttons = document.querySelectorAll('.option-btn');

        buttons.forEach((btn, idx) => {
            btn.disabled = true;
            if (idx === qData.correct) {
                btn.classList.add('correct');
            }
            if (idx === selectedIndex && selectedIndex !== qData.correct) {
                btn.classList.add('incorrect');
            }
        });

        if (selectedIndex === qData.correct) {
            score++;
            document.getElementById('scoreDisplay').textContent = score;
        }

        const expBox = document.getElementById('explanationText');
        expBox.textContent = qData.exp;
        expBox.style.display = 'block';

        const nextBtn = document.getElementById('nextBtn');
        if (currentIndex < 9) {
            nextBtn.textContent = "Next Question";
        } else {
            nextBtn.textContent = "See Final Results";
        }
        nextBtn.style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < 10) {
            displayQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('modeSelector').style.display = 'none';
        
        const resultsCard = document.getElementById('resultsCard');
        resultsCard.style.display = 'block';

        document.getElementById('finalScore').textContent = score;

        let feedback = "";
        if (score === 10) feedback = "Flawless performance! You are a master zoologist!";
        else if (score >= 7) feedback = "Great job! You have impressive fauna knowledge.";
        else if (score >= 4) feedback = "Good try! Give it another go to boost your score.";
        else feedback = "Animal facts can be tough! Try another round with fresh questions.";

        document.getElementById('feedbackText').textContent = feedback;
    }

    function restartQuiz() {
        currentIndex = 0;
        score = 0;
        
        document.getElementById('resultsCard').style.display = 'none';
        document.getElementById('quizArea').style.display = 'block';
        document.getElementById('modeSelector').style.display = 'flex';

        loadQuestions();
        displayQuestion();
    }

    window.onload = () => {
        setDifficulty('easy');
    };
</script>
